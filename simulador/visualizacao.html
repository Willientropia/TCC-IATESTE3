<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulação — Decisão Ideal de Descarga da Bateria</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: #58a6ff;
  }
  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .controls button, .controls select {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    padding: 8px 18px;
    border: 1px solid #30363d;
    border-radius: 8px;
    background: #161b22;
    color: #e6edf3;
    cursor: pointer;
    transition: all 0.2s;
  }
  .controls button:hover, .controls select:hover {
    background: #21262d;
    border-color: #58a6ff;
  }
  .controls button.active {
    background: #1f6feb;
    border-color: #1f6feb;
    color: #fff;
  }
  .controls label { font-size: 0.8rem; color: #8b949e; }
  .speed-control { display: flex; align-items: center; gap: 6px; }
  .chart-container {
    position: relative;
    width: 100%;
    height: calc(100vh - 200px);
    min-height: 500px;
    background: #161b22;
    border-radius: 12px;
    border: 1px solid #30363d;
    padding: 12px;
  }
  .info-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .info-item {
    font-size: 0.82rem;
    padding: 6px 14px;
    background: #21262d;
    border-radius: 8px;
    border: 1px solid #30363d;
  }
  .info-item span { font-weight: 600; }
  .val-green { color: #3fb950; }
  .val-yellow { color: #d29922; }
  .val-red { color: #f85149; }
  .val-blue { color: #58a6ff; }
  .status-text {
    text-align: center;
    margin-top: 8px;
    font-size: 0.9rem;
    color: #58a6ff;
    font-weight: 500;
    min-height: 24px;
  }
</style>
</head>
<body>

<h1>🔋 Simulação — Decisão Ideal de Descarga da Bateria</h1>

<div class="controls">
  <button id="btn3d" onclick="loadScenario('3d')">Cenário 3d (Queda D2)</button>
  <button id="btn7d" onclick="loadScenario('7d')">Cenário 7 dias</button>
  <span style="color:#30363d">│</span>
  <button id="btnPlay" onclick="togglePlay()">▶ Iniciar</button>
  <button onclick="resetSim()">↺ Resetar</button>
  <div class="speed-control">
    <label>Velocidade:</label>
    <select id="speedSelect" onchange="updateSpeed()">
      <option value="200">Rápida</option>
      <option value="400" selected>Normal</option>
      <option value="800">Lenta</option>
      <option value="50">Ultra Rápida</option>
    </select>
  </div>
</div>

<div class="chart-container">
  <canvas id="mainChart"></canvas>
</div>

<div class="info-bar">
  <div class="info-item">Slot: <span id="infoSlot" class="val-blue">—</span></div>
  <div class="info-item">SOC: <span id="infoSoc" class="val-green">—</span></div>
  <div class="info-item">Bateria: <span id="infoBat" class="val-yellow">—</span> Wh</div>
  <div class="info-item">Decisão: <span id="infoDecision" class="val-blue">—</span></div>
  <div class="info-item">Economia Rede: <span id="infoSaved" class="val-green">—</span> Wh</div>
</div>
<div class="status-text" id="statusText">Selecione um cenário e clique em Iniciar</div>

<script>
// ========== CONSTANTES ==========
const CAPACITY_WH = 5000;
const MAX_DISCHARGE_SLOT = 1485; // 27A × 220V × 0.25h
const MAX_CHARGE_SLOT = 742.5;   // 13.5A × 220V × 0.25h
const SLOT_H = 0.25;
const SOC_FLOOR = 0.10;          // 10% — reserva mínima absoluta
const SOC_TARGET_SUNRISE = 0.12; // 12% — alvo ao amanhecer

let scenario = null;
let chart = null;
let playing = false;
let timer = null;
let currentSlot = 0;
let speed = 400;

let simBattery = [];
let simGrid = [];
let simDecisions = [];
let gridOutageSlots = new Set();
let totalSaved = 0;

// ========== CARREGAR CENÁRIO ==========
async function loadScenario(type) {
  stopPlay();
  const file = type === '3d' ? '3d_D1_00h_queda.json' : 'prova_7dias.json';
  try {
    const resp = await fetch(file);
    scenario = await resp.json();
  } catch(e) {
    alert('Erro ao carregar ' + file);
    return;
  }
  
  document.getElementById('btn3d').classList.toggle('active', type === '3d');
  document.getElementById('btn7d').classList.toggle('active', type === '7d');
  
  detectOutageSlots();
  simulateIdeal();
  buildChart();
  
  currentSlot = 0;
  updateInfo();
  document.getElementById('statusText').textContent = 
    `Cenário "${scenario.nome}" — ${scenario.nDias} dias, ${scenario.slotLabels.length} slots. Clique em Iniciar.`;
}

function detectOutageSlots() {
  gridOutageSlots.clear();
  if (!scenario) return;
  const desc = scenario.descricao || '';
  
  if (desc.includes('Queda de energia das 00:00 às 05:00 no D2')) {
    for (let i = 96; i <= 116; i++) gridOutageSlots.add(i);
  }
  if (desc.includes('queda 3h às 02h no D6')) {
    for (let i = 488; i <= 500; i++) gridOutageSlots.add(i);
  }
}

// ========== DETECTAR PERÍODO SOLAR POR DIA ==========
// Retorna { solarStart, solarEnd } em slot-do-dia (0-95)
function detectSolarPeriods(gen, nDias) {
  const periods = [];
  for (let day = 0; day < nDias; day++) {
    const base = day * 96;
    let first = -1, last = -1;
    
    // Percorrer o dia e marcar slots com geração significativa
    // Usar janela de 5 slots para suavizar intermitência
    for (let s = 0; s < 96; s++) {
      let sum = 0, cnt = 0;
      for (let k = -2; k <= 2; k++) {
        const idx = base + s + k;
        if (idx >= 0 && idx < gen.length) {
          sum += Math.max(0, gen[idx]);
          cnt++;
        }
      }
      if (cnt > 0 && (sum / cnt) >= 150) {
        if (first === -1) first = s;
        last = s;
      }
    }
    
    if (first === -1) { first = 27; last = 70; } // fallback ~06:45 a ~17:30
    periods.push({ solarStart: first, solarEnd: last });
  }
  return periods;
}

// ========== SIMULAÇÃO IDEAL ==========
function simulateIdeal() {
  if (!scenario) return;
  
  const gen = scenario.generation;
  const load = scenario.load;
  const nSlots = gen.length;
  const nDias = scenario.nDias || Math.ceil(nSlots / 96);
  const socInicial = scenario.socInicial || 99;
  
  simBattery = new Array(nSlots);
  simGrid = new Array(nSlots);
  simDecisions = new Array(nSlots);
  totalSaved = 0;
  
  // 1. Detectar período solar de cada dia
  const solarPeriods = detectSolarPeriods(gen, nDias);
  
  // 2. Pré-computar janelas de descarga para cada noite
  //    Para cada noite: calcular quando começar a descarregar
  //    para chegar em ~10-15% SOC no amanhecer
  const dischargeWindows = computeDischargeWindows(gen, load, nDias, solarPeriods, socInicial);
  
  // 3. Simular slot por slot
  let batteryWh = (socInicial / 100) * CAPACITY_WH;
  
  for (let i = 0; i < nSlots; i++) {
    const genW = Math.max(0, gen[i]);
    const loadW = Math.max(0, load[i]);
    const isOutage = gridOutageSlots.has(i);
    const day = Math.floor(i / 96);
    const slotInDay = i % 96;
    const sp = solarPeriods[Math.min(day, solarPeriods.length - 1)];
    const inSolar = (slotInDay >= sp.solarStart && slotInDay <= sp.solarEnd);
    
    // Verificar se estamos na janela de descarga
    const inDischargeWindow = isInDischargeWindow(i, dischargeWindows);
    
    let decision, gridW, deltaWh = 0;
    
    if (isOutage) {
      // ===== QUEDA: bateria cobre a carga =====
      decision = 'OUTAGE';
      const needed = loadW * SLOT_H;
      const available = Math.max(0, batteryWh - (SOC_FLOOR * CAPACITY_WH));
      const provide = Math.min(needed, available, MAX_DISCHARGE_SLOT);
      deltaWh = -provide;
      gridW = 0; // rede caiu
      
    } else if (inSolar) {
      // ===== PERÍODO SOLAR: carregar bateria =====
      decision = 'SOLAR_CHARGE';
      const surplus = genW - loadW;
      if (surplus > 0) {
        const space = CAPACITY_WH - batteryWh;
        const charge = Math.min(surplus * SLOT_H, space, MAX_CHARGE_SLOT);
        deltaWh = charge;
        gridW = loadW - genW + (charge / SLOT_H);
      } else {
        gridW = loadW - genW;
        deltaWh = 0;
      }
      
    } else if (inDischargeWindow && !isOutage) {
      // ===== JANELA DE DESCARGA: descarregar continuamente =====
      decision = 'DISCHARGE';
      const available = Math.max(0, batteryWh - (SOC_FLOOR * CAPACITY_WH));
      const provide = Math.min(loadW * SLOT_H, available, MAX_DISCHARGE_SLOT);
      if (provide > 0) {
        deltaWh = -provide;
        gridW = Math.max(0, loadW - (provide / SLOT_H));
        totalSaved += provide;
      } else {
        // Bateria esgotada → STANDBY
        decision = 'STANDBY';
        gridW = loadW;
        deltaWh = 0;
      }
      
    } else {
      // ===== NOITE FORA DA JANELA: STANDBY =====
      decision = 'STANDBY';
      gridW = loadW;
      deltaWh = 0;
    }
    
    batteryWh = Math.max(0, Math.min(CAPACITY_WH, batteryWh + deltaWh));
    simBattery[i] = batteryWh;
    simGrid[i] = gridW;
    simDecisions[i] = decision;
  }
}

// Pré-computa as janelas de descarga para cada noite
function computeDischargeWindows(gen, load, nDias, solarPeriods, socInicial) {
  const windows = []; // { startSlot, endSlot } absolutos
  
  // Simular bateria rapidamente apenas para estimar SOC ao fim de cada período solar
  let batWh = (socInicial / 100) * CAPACITY_WH;
  const nSlots = gen.length;
  
  for (let day = 0; day < nDias; day++) {
    const sp = solarPeriods[Math.min(day, solarPeriods.length - 1)];
    const nextDay = day + 1;
    const nextSp = solarPeriods[Math.min(nextDay, solarPeriods.length - 1)];
    
    const solarEndAbsolute = day * 96 + sp.solarEnd;
    const nextSolarStartAbsolute = nextDay * 96 + nextSp.solarStart;
    
    if (nextSolarStartAbsolute > nSlots) {
      // Último dia parcial — sem janela
      break;
    }
    
    // Simular carga solar durante o dia para estimar bateria ao fim do solar
    const dayStart = day * 96;
    for (let s = dayStart; s <= solarEndAbsolute && s < nSlots; s++) {
      const g = Math.max(0, gen[s]);
      const l = Math.max(0, load[s]);
      const slotInDay = s % 96;
      
      if (slotInDay >= sp.solarStart && slotInDay <= sp.solarEnd) {
        const surplus = g - l;
        if (surplus > 0) {
          const charge = Math.min(surplus * SLOT_H, CAPACITY_WH - batWh, MAX_CHARGE_SLOT);
          batWh = Math.min(CAPACITY_WH, batWh + charge);
        }
      }
    }
    
    const batteryAtSolarEnd = batWh;
    const usable = Math.max(0, batteryAtSolarEnd - (SOC_TARGET_SUNRISE * CAPACITY_WH));
    
    // Calcular carga média noturna real (da noite que vai acontecer)
    let nightLoadSum = 0, nightCount = 0;
    for (let s = solarEndAbsolute + 1; s < nextSolarStartAbsolute && s < nSlots; s++) {
      const l = Math.max(0, load[s]);
      if (l > 0) { nightLoadSum += l; nightCount++; }
    }
    const avgNightLoad = nightCount > 0 ? nightLoadSum / nightCount : 750;
    
    // Quantos slots de descarga cabem na energia utilizável?
    const whPerSlot = avgNightLoad * SLOT_H;
    const dischargeSlots = whPerSlot > 0 ? Math.floor(usable / whPerSlot) : 0;
    
    // Início da descarga = upstream do amanhecer
    const dischargeStart = Math.max(solarEndAbsolute + 1, nextSolarStartAbsolute - dischargeSlots);
    
    windows.push({
      startSlot: dischargeStart,
      endSlot: nextSolarStartAbsolute - 1
    });
    
    // Estimar bateria ao amanhecer (para o próximo dia)
    // Descarregar durante a janela
    const slotsInWindow = nextSolarStartAbsolute - dischargeStart;
    batWh = batteryAtSolarEnd - (slotsInWindow * whPerSlot);
    batWh = Math.max(SOC_FLOOR * CAPACITY_WH, batWh);
  }
  
  return windows;
}

function isInDischargeWindow(slot, windows) {
  for (const w of windows) {
    if (slot >= w.startSlot && slot <= w.endSlot) return true;
  }
  return false;
}

// ========== CHART ==========
function buildChart() {
  if (!scenario) return;
  if (chart) chart.destroy();
  
  const labels = scenario.slotLabels;
  const nSlots = labels.length;
  
  const annotations = {};
  let outageStart = null;
  for (let i = 0; i <= nSlots; i++) {
    const isOut = gridOutageSlots.has(i);
    if (isOut && outageStart === null) outageStart = i;
    if (!isOut && outageStart !== null) {
      annotations['outage_' + outageStart] = {
        type: 'box',
        xMin: outageStart, xMax: i - 1,
        backgroundColor: 'rgba(248, 81, 73, 0.15)',
        borderColor: 'rgba(248, 81, 73, 0.4)',
        borderWidth: 1,
        label: {
          display: true, content: 'QUEDA', color: '#f85149',
          font: { size: 11, weight: 'bold' }, position: 'start'
        }
      };
      outageStart = null;
    }
  }
  
  const ctx = document.getElementById('mainChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Geração Solar (W)',
          data: scenario.generation.map(v => Math.max(0,v)),
          borderColor: '#d29922',
          backgroundColor: 'rgba(210, 153, 34, 0.08)',
          fill: true, borderWidth: 1.5, pointRadius: 0, tension: 0.2, order: 3
        },
        {
          label: 'Carga / Consumo (W)',
          data: scenario.load.map(v => Math.max(0,v)),
          borderColor: '#f0883e',
          backgroundColor: 'transparent',
          borderWidth: 1.5, pointRadius: 0, tension: 0.2, order: 2
        },
        {
          label: 'Rede (W)',
          data: [],
          borderColor: '#8b5cf6',
          backgroundColor: 'transparent',
          borderWidth: 1.5, pointRadius: 0, tension: 0.1, borderDash: [4, 3], order: 4
        },
        {
          label: 'Energia Bateria (Wh)',
          data: [],
          borderColor: '#58a6ff',
          backgroundColor: 'transparent',
          borderWidth: 2.5, pointRadius: 0, tension: 0.3, order: 1
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: {
            color: '#8b949e', font: { family: 'Inter', size: 11 },
            padding: 16, usePointStyle: true, pointStyleWidth: 12
          }
        },
        annotation: { annotations },
        tooltip: {
          backgroundColor: '#21262d', titleColor: '#e6edf3', bodyColor: '#8b949e',
          borderColor: '#30363d', borderWidth: 1, padding: 10,
          callbacks: {
            afterBody: function(ctx) {
              const idx = ctx[0].dataIndex;
              if (idx < simDecisions.length) {
                const dec = simDecisions[idx];
                const map = {
                  'STANDBY': '⏸ STANDBY', 'DISCHARGE': '⚡ DESCARGA',
                  'SOLAR_CHARGE': '☀️ CARGA SOLAR', 'OUTAGE': '🔴 QUEDA'
                };
                return '\nDecisão: ' + (map[dec] || dec);
              }
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#8b949e', font: { size: 9 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 30 },
          grid: { color: 'rgba(48, 54, 61, 0.5)' }
        },
        y: {
          position: 'left',
          min: -500,
          ticks: { color: '#8b949e', font: { size: 10 }, callback: v => v.toLocaleString() + ' W' },
          grid: { color: 'rgba(48, 54, 61, 0.3)' },
          title: { display: true, text: 'Potência (W) / Energia (Wh)', color: '#8b949e', font: { size: 11 } }
        }
      }
    }
  });
}

// ========== ANIMAÇÃO ==========
function togglePlay() {
  if (!scenario) { alert('Carregue um cenário primeiro!'); return; }
  playing ? stopPlay() : startPlay();
}

function startPlay() {
  playing = true;
  document.getElementById('btnPlay').textContent = '⏸ Pausar';
  document.getElementById('btnPlay').classList.add('active');
  if (currentSlot >= scenario.slotLabels.length) currentSlot = 0;
  
  timer = setInterval(() => {
    if (currentSlot >= scenario.slotLabels.length) {
      stopPlay();
      document.getElementById('statusText').textContent = 
        `✅ Simulação concluída! Economia total: ${totalSaved.toFixed(0)} Wh`;
      return;
    }
    advanceSlot();
  }, speed);
}

function stopPlay() {
  playing = false;
  if (timer) clearInterval(timer);
  timer = null;
  document.getElementById('btnPlay').textContent = '▶ Iniciar';
  document.getElementById('btnPlay').classList.remove('active');
}

function resetSim() {
  stopPlay();
  currentSlot = 0;
  if (chart) {
    chart.data.datasets[2].data = [];
    chart.data.datasets[3].data = [];
    chart.update('none');
  }
  updateInfo();
  document.getElementById('statusText').textContent = 'Simulação resetada.';
}

function advanceSlot() {
  if (!chart || !scenario) return;
  const gridData = chart.data.datasets[2].data;
  const batData = chart.data.datasets[3].data;
  
  while (gridData.length < currentSlot) gridData.push(null);
  while (batData.length < currentSlot) batData.push(null);
  
  gridData[currentSlot] = simGrid[currentSlot];
  batData[currentSlot] = simBattery[currentSlot];
  
  chart.update('none');
  updateInfo();
  currentSlot++;
}

function updateInfo() {
  if (!scenario || currentSlot <= 0) {
    ['infoSlot','infoSoc','infoBat','infoDecision'].forEach(id => 
      document.getElementById(id).textContent = '—');
    document.getElementById('infoSaved').textContent = '0';
    return;
  }
  
  const idx = Math.min(currentSlot - 1, simBattery.length - 1);
  const soc = ((simBattery[idx] / CAPACITY_WH) * 100).toFixed(1);
  const dec = simDecisions[idx];
  const decMap = {
    'STANDBY': '⏸ STANDBY', 'DISCHARGE': '⚡ DESCARGA',
    'SOLAR_CHARGE': '☀️ CARGA SOLAR', 'OUTAGE': '🔴 QUEDA'
  };
  
  document.getElementById('infoSlot').textContent = scenario.slotLabels[idx];
  
  const socEl = document.getElementById('infoSoc');
  socEl.textContent = soc + '%';
  socEl.className = soc > 60 ? 'val-green' : soc > 30 ? 'val-yellow' : 'val-red';
  
  document.getElementById('infoBat').textContent = simBattery[idx].toFixed(0);
  
  const decEl = document.getElementById('infoDecision');
  decEl.textContent = decMap[dec] || dec;
  decEl.className = dec === 'DISCHARGE' ? 'val-yellow' : dec === 'OUTAGE' ? 'val-red' : 
                     dec === 'SOLAR_CHARGE' ? 'val-green' : 'val-blue';
  
  document.getElementById('infoSaved').textContent = totalSaved.toFixed(0);
  
  if (playing) {
    const msgs = {
      'DISCHARGE': 'Descarregando — economizando rede',
      'OUTAGE': '⚠️ QUEDA — bateria sustentando carga!',
      'SOLAR_CHARGE': 'Sol carregando bateria',
      'STANDBY': 'Standby — preservando bateria'
    };
    document.getElementById('statusText').textContent = 
      `${scenario.slotLabels[idx]} — ${msgs[dec] || dec}`;
  }
}

function updateSpeed() {
  speed = parseInt(document.getElementById('speedSelect').value);
  if (playing) { stopPlay(); startPlay(); }
}
</script>
</body>
</html>
